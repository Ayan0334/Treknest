services:
  # 1. Express API Backend Service
  - type: web
    name: treknest-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # Must be supplied manually (MongoDB Atlas Connection URI)
      - key: JWT_SECRET
        generateValue: true # Generates a cryptographically secure random token automatically
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 465
      - key: SMTP_USER
        sync: false # Must be supplied manually (Gmail address for OTP notifications)
      - key: SMTP_PASS
        sync: false # Must be supplied manually (Gmail App Password)
      - key: RESEND_API_KEY
        sync: false # Optional: Resend API Key for sending emails via HTTP API on Render Free tier
      - key: RESEND_FROM_EMAIL
        value: TrekNest <onboarding@resend.dev> # Optional: Resend sender email address
      - key: GMAIL_CLIENT_ID
        sync: false # Optional: Google OAuth2 Client ID for Gmail HTTP API
      - key: GMAIL_CLIENT_SECRET
        sync: false # Optional: Google OAuth2 Client Secret for Gmail HTTP API
      - key: GMAIL_REFRESH_TOKEN
        sync: false # Optional: Google OAuth2 Refresh Token for Gmail HTTP API
      - key: RAZORPAY_KEY_ID
        sync: false # Optional: Razorpay Public Key for payments
      - key: RAZORPAY_KEY_SECRET
        sync: false # Optional: Razorpay Secret Key for signatures

  # 2. React + Vite Frontend Static Site
  - type: web
    name: treknest-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # Direct all page routes to index.html to support React Router single-page application paths
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false # Must be supplied manually after backend is deployed (e.g., https://treknest-backend.onrender.com)
